# openspec/config.yaml — agencia
schema: spec-driven

context: |
  Tech stack: TypeScript/Node.js, Payload CMS 3.x (backend), PostgreSQL, Astro 4.x (static fronts), Next.js 16.x (dynamic fronts)
  Architecture: Multi-tenant SaaS — centralized Payload backend + separate frontend projects per client, Cloudinary media, Stripe payments, Notion/Airtable CRM
  Testing: Vitest (integration), Playwright (E2E), ESLint + Prettier, TypeScript strict
  Style: Vanilla CSS / SCSS / CSS Modules per project. NO Tailwind. Convention-driven.

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Reference the architecture design doc at docs/superpowers/specs/2026-06-08-agencia-saas-design.md
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    - Default TDD: true
    - TypeScript: strict, use tsc --noEmit for type checking
    - ESLint + Prettier configured — run lint before commit
  verify:
    test_command: "pnpm test"
    build_command: "pnpm build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

# SDD — Testing Capabilities (detected 2026-06-10)
testing:
  strict_tdd: false
  reason: "Testing infrastructure configured. TDD optional per task."
  test_runner:
    available: true
    command: "pnpm test"
    framework: "Vitest"
  layers:
    unit: { available: true, tool: "Vitest" }
    integration: { available: true, tool: "Vitest" }
    e2e: { available: true, tool: "Playwright" }
  coverage:
    available: true
    command: "vitest run --coverage"
  quality:
    linter: { available: true, command: "pnpm lint" }
    type_checker: { available: true, command: "pnpm typecheck" }
    formatter: { available: true, command: "pnpm prettier --check ." }
